name: Deploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: deploy-lacet-serverless-container
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build and push image to Scaleway
    runs-on: ubuntu-latest
    outputs:
      tag_version: ${{ steps.meta.outputs.tag_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute build metadata
        id: meta
        run: |
          TAG_VERSION="${GITHUB_REF_NAME}"
          echo "TAG_VERSION=${TAG_VERSION}" >> "$GITHUB_ENV"
          echo "tag_version=${TAG_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Log in to Scaleway Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.SCW_REGISTRY }}
          username: ${{ vars.SCW_REGISTRY_USERNAME }}
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ vars.SCW_REGISTRY }}/${{ vars.SCW_REGISTRY_NAMESPACE }}/${{ vars.SCW_IMAGE_NAME }}:latest
            ${{ vars.SCW_REGISTRY }}/${{ vars.SCW_REGISTRY_NAMESPACE }}/${{ vars.SCW_IMAGE_NAME }}:${{ env.TAG_VERSION }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_MAPBOX_TOKEN=${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Scaleway Serverless Container
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Install Scaleway CLI
        run: |
          RELEASE=$(curl -s https://api.github.com/repos/scaleway/scaleway-cli/releases/latest)
          VERSION=$(echo "$RELEASE" | jq -r '.tag_name')
          ASSET_URL=$(echo "$RELEASE" | jq -r '
            .assets[]
            | select(.name | ascii_downcase | (contains("linux") and contains("amd64")))
            | .browser_download_url
          ' | head -1)
          echo "Installing Scaleway CLI ${VERSION}"
          echo "Asset: ${ASSET_URL}"
          curl -fsSL "${ASSET_URL}" -o /tmp/scw_asset
          if file /tmp/scw_asset | grep -q "compressed\|tar"; then
            tar -xzf /tmp/scw_asset -C /tmp/
            sudo mv /tmp/scw /usr/local/bin/scw
          else
            chmod +x /tmp/scw_asset
            sudo mv /tmp/scw_asset /usr/local/bin/scw
          fi
          scw version

      - name: Deploy to Scaleway Serverless Container
        env:
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_DEFAULT_PROJECT_ID: ${{ vars.SCW_DEFAULT_PROJECT_ID }}
          SCW_DEFAULT_REGION: ${{ vars.SCW_DEFAULT_REGION }}
          SCW_DEFAULT_ORGANIZATION_ID: ${{ vars.SCW_DEFAULT_ORGANIZATION_ID }}
          SCW_CONTAINER_NAMESPACE: ${{ vars.SCW_CONTAINER_NAMESPACE }}
          SCW_CONTAINER_NAME: ${{ vars.SCW_CONTAINER_NAME }}
          SCW_IMAGE: ${{ vars.SCW_REGISTRY }}/${{ vars.SCW_REGISTRY_NAMESPACE }}/${{ vars.SCW_IMAGE_NAME }}:${{ needs.build-and-push.outputs.tag_version }}
        run: |
          NAMESPACE_ID=$(scw container namespace list \
            name="$SCW_CONTAINER_NAMESPACE" \
            project-id="$SCW_DEFAULT_PROJECT_ID" \
            -o json | jq -r '.[0].id')
          echo "Namespace ID: $NAMESPACE_ID"

          CONTAINER_ID=$(scw container container list \
            namespace-id="$NAMESPACE_ID" \
            name="$SCW_CONTAINER_NAME" \
            -o json | jq -r '.[0].id')
          echo "Container ID: $CONTAINER_ID"

          scw container container update "$CONTAINER_ID" \
            registry-image="$SCW_IMAGE"

          echo "Waiting for container update to finish..."
          for attempt in $(seq 1 60); do
            STATUS=$(scw container container get "$CONTAINER_ID" -o json | jq -r '.status')
            echo "Container status: $STATUS"

            if [ "$STATUS" = "ready" ]; then
              break
            fi

            if [ "$STATUS" = "error" ]; then
              echo "Container entered error state during update."
              exit 1
            fi

            if [ "$attempt" -eq 60 ]; then
              echo "Timed out waiting for container to become ready."
              exit 1
            fi

            sleep 10
          done

          echo "✓ Déployé : $SCW_IMAGE"
