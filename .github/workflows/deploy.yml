name: Deploy

on:
  push:
    tags:
      - 'v*'

env:
  TAG_VERSION: ${{ github.ref_name }}
  TAG_SHA: ${{ github.sha }}

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Scaleway Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.SCW_REGISTRY }}
          username: ${{ vars.SCW_REGISTRY_USERNAME }}
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ vars.SCW_REGISTRY }}/${{ vars.SCW_REGISTRY_NAMESPACE }}/${{ vars.SCW_IMAGE_NAME }}:${{ env.TAG_VERSION }}
            ${{ vars.SCW_REGISTRY }}/${{ vars.SCW_REGISTRY_NAMESPACE }}/${{ vars.SCW_IMAGE_NAME }}:latest
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_MAPBOX_TOKEN=${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Scaleway Serverless Containers
        env:
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_DEFAULT_PROJECT_ID: ${{ vars.SCW_PROJECT_ID }}
          SCW_DEFAULT_REGION: ${{ vars.SCW_REGION }}
        run: |
          NAMESPACE_ID=$(scw container namespace list \
            name=${{ vars.SCW_CONTAINER_NAMESPACE }} \
            project-id=${{ vars.SCW_PROJECT_ID }} \
            -o json | jq -r '.[0].id')

          echo "Namespace ID: $NAMESPACE_ID"

          CONTAINER_ID=$(scw container container list \
            namespace-id=$NAMESPACE_ID \
            name=${{ vars.SCW_CONTAINER_NAME }} \
            -o json | jq -r '.[0].id')

          echo "Container ID: $CONTAINER_ID"

          scw container container update $CONTAINER_ID \
            registry-image=${{ vars.SCW_REGISTRY }}/${{ vars.SCW_REGISTRY_NAMESPACE }}/${{ vars.SCW_IMAGE_NAME }}:${{ env.TAG_VERSION }}

          scw container container deploy $CONTAINER_ID

          echo "✓ Déployé : ${{ vars.SCW_REGISTRY }}/${{ vars.SCW_REGISTRY_NAMESPACE }}/${{ vars.SCW_IMAGE_NAME }}:${{ env.TAG_VERSION }}"
